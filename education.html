<!DOCTYPE html>

<head>

    <title>Education</title>
    <link rel="stylesheet" href="style.css">
<style>
  .copy{
            text-align: center;
            font-size: 12px;
            padding: 10px;
            width: 100%;
            color: white;
            position: absolute;
            bottom: 0;
            left: 0;
        }
        .back-video {
            position: fixed;
            top: 70%;
            left: 50%;
            width: 100%; 
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;   /* key for responsiveness */
            opacity: 0.3;
             z-index: -1;
        }
        @media (max-aspect-ratio: 16/9) {
            .back-video {
                width: auto;
                height: 100%;
            }
        }

        @media (min-aspect-ratio: 16/9) {
            .back-video {
                width: 100%;
                height: auto;
            }
        }

        @media (max-aspect-ratio: 768px) {
            .back-video {
                width: 100%;
                height: auto;
            }
        }
</style>
</head>
<body>
  <video class="back-video" autoplay muted loop playsinline poster="Background_Video.mp4" preload="auto">
        <source src="Background_Video.mp4" type="video/mp4">
        Your browser does not support the video tag.
   </video>
